<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Assist architecture flow</title>
  <desc id="desc">Home Assistant Assist sends messages to Codex Assist, which authenticates with ChatGPT Codex access, asks Codex for a response, and only executes tool calls through Home Assistant's exposed Assist entities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111F"/>
      <stop offset="0.55" stop-color="#071827"/>
      <stop offset="1" stop-color="#0A1020"/>
    </linearGradient>
    <linearGradient id="blue" x1="70" y1="0" x2="310" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3FDBFF"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#42F5B3"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#7DD3FC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1200" height="520" rx="38" fill="url(#bg)"/>
  <circle cx="1010" cy="92" r="180" fill="#2563EB" opacity="0.12"/>
  <circle cx="150" cy="455" r="190" fill="#14B8A6" opacity="0.10"/>

  <text x="72" y="78" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="760">How Codex Assist works</text>
  <text x="72" y="114" fill="#A7B6C9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">Codex answers through Home Assistant Assist. Device control stays bounded to exposed entities.</text>

  <g filter="url(#soft)">
    <rect x="72" y="180" width="220" height="150" rx="26" fill="#0F2437" stroke="#1E3A5F"/>
    <text x="104" y="230" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="740">Home Assistant</text>
    <text x="104" y="263" fill="#A7B6C9" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Assist pipeline</text>
    <text x="104" y="289" fill="#A7B6C9" font-family="Inter, ui-sans-serif, system-ui" font-size="15">voice or chat request</text>
  </g>

  <g filter="url(#soft)">
    <rect x="384" y="166" width="258" height="178" rx="30" fill="url(#blue)"/>
    <rect x="400" y="182" width="226" height="146" rx="22" fill="#061525" opacity="0.76"/>
    <text x="432" y="230" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="780">Codex Assist</text>
    <text x="432" y="263" fill="#D7F3FF" font-family="Inter, ui-sans-serif, system-ui" font-size="15">custom integration</text>
    <text x="432" y="289" fill="#D7F3FF" font-family="Inter, ui-sans-serif, system-ui" font-size="15">tokens + tool mapping</text>
  </g>

  <g filter="url(#soft)">
    <rect x="736" y="180" width="260" height="150" rx="26" fill="#10233A" stroke="#25486D"/>
    <text x="768" y="230" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="740">Codex / ChatGPT</text>
    <text x="768" y="263" fill="#A7B6C9" font-family="Inter, ui-sans-serif, system-ui" font-size="15">eligible subscription</text>
    <text x="768" y="289" fill="#A7B6C9" font-family="Inter, ui-sans-serif, system-ui" font-size="15">model response</text>
  </g>

  <path d="M302 255H372" stroke="#7DD3FC" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M652 255H724" stroke="#7DD3FC" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M736 306C690 386 540 404 472 344" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 10" marker-end="url(#arrow)"/>

  <g filter="url(#soft)">
    <rect x="260" y="388" width="680" height="76" rx="22" fill="#071928" stroke="#164E63"/>
    <rect x="286" y="410" width="166" height="32" rx="16" fill="url(#green)" opacity="0.95"/>
    <text x="310" y="432" fill="#03201A" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Safety boundary</text>
    <text x="480" y="432" fill="#D8F6FF" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="620">Home Assistant Assist LLM API → exposed entities only</text>
  </g>

  <g>
    <rect x="1016" y="200" width="112" height="112" rx="28" fill="#081624" stroke="#1C3B5A"/>
    <path d="M1050 264V242L1072 224L1094 242V264" stroke="#67E8F9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1058 264H1086" stroke="#67E8F9" stroke-width="7" stroke-linecap="round"/>
    <circle cx="1072" cy="242" r="9" fill="#C084FC"/>
    <text x="1010" y="344" fill="#A7B6C9" font-family="Inter, ui-sans-serif, system-ui" font-size="14">lights, fans, climate…</text>
  </g>
</svg>
